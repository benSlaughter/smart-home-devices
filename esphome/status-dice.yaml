# Status Dice — ESPHome Configuration
# Olimex ESP32-C3-DevKit-Lipo + SparkFun LIS3DH
# Deep sleeps on battery, stays awake on USB power

esphome:
  name: status-dice
  friendly_name: "Status Dice"
  on_boot:
    - priority: 200
      then:
        - lambda: |-
            auto *bus = id(i2c_bus);
            uint8_t data[2];

            // CTRL_REG1 (0x20): 0x27 = 10Hz ODR, normal mode, all axes enabled
            data[0] = 0x20; data[1] = 0x27;
            bus->write(0x19, data, 2);

            // CTRL_REG2 (0x21): 0x01 = HP filter on INT1
            data[0] = 0x21; data[1] = 0x01;
            bus->write(0x19, data, 2);

            // CTRL_REG3 (0x22): 0x40 = IA1 interrupt on INT1 pin
            data[0] = 0x22; data[1] = 0x40;
            bus->write(0x19, data, 2);

            // CTRL_REG5 (0x24): 0x08 = latch interrupt on INT1
            data[0] = 0x24; data[1] = 0x08;
            bus->write(0x19, data, 2);

            // INT1_THS (0x32): motion threshold (~250mg)
            data[0] = 0x32; data[1] = 0x10;
            bus->write(0x19, data, 2);

            // INT1_DURATION (0x33): minimum duration (1 sample)
            data[0] = 0x33; data[1] = 0x01;
            bus->write(0x19, data, 2);

            // INT1_CFG (0x30): 0x2A = OR of X/Y/Z high events (movement on any axis)
            data[0] = 0x30; data[1] = 0x2A;
            bus->write(0x19, data, 2);

            // Read INT1_SRC (0x31) to clear any pending interrupt
            uint8_t reg = 0x31;
            uint8_t dummy;
            bus->write(0x19, &reg, 1);
            bus->read(0x19, &dummy, 1);

        # Wait for readings to stabilise and WiFi to connect
        - delay: 3s
        # Force sensor updates
        - component.update: battery_voltage
        - component.update: accel_x
        - component.update: accel_y
        - component.update: accel_z
        - delay: 1s
        - component.update: office_status
        - component.update: battery_percent
        # Sleep if on battery, stay awake if USB powered
        - if:
            condition:
              binary_sensor.is_off: usb_powered
            then:
              - delay: 8s
              - deep_sleep.enter: deep_sleep_1

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

safe_mode:
  num_attempts: 10
  boot_is_good_after: 5s

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "StatusDice-Fallback"
    password: "fallback123"

captive_portal:

# I2C bus — Olimex UEXT pins
i2c:
  id: i2c_bus
  sda: GPIO7
  scl: GPIO3
  scan: false

# Deep sleep — wakes on GPIO0 (LIS3DH INT1 pin)
deep_sleep:
  id: deep_sleep_1
  wakeup_pin:
    number: GPIO0
    mode: INPUT_PULLDOWN
    inverted: false
  # Fallback: wake every 15 minutes even without motion (heartbeat)
  run_duration: 20s
  sleep_duration: 15min

# Read raw accelerometer values from LIS3DH via I2C
sensor:
  # Battery voltage — GPIO4 (ADC1_CH4) via jumper wire from bat_sens pad
  # Voltage divider on board: multiply by 2 to get actual battery voltage
  - platform: adc
    pin: GPIO4
    name: "Dice Battery Voltage"
    id: battery_voltage
    update_interval: never
    attenuation: 12db
    unit_of_measurement: "V"
    accuracy_decimals: 2
    filters:
      - multiply: 2.0

  - platform: template
    name: "Dice Battery"
    id: battery_percent
    update_interval: never
    unit_of_measurement: "%"
    device_class: battery
    accuracy_decimals: 0
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return NAN;
      // LiPo: 4.2V = 100%, 3.0V = 0%
      float pct = (v - 3.0) / (4.2 - 3.0) * 100.0;
      if (pct > 100) pct = 100;
      if (pct < 0) pct = 0;
      return pct;

  - platform: template
    name: "Dice Accel X"
    id: accel_x
    update_interval: 2s
    unit_of_measurement: "m/s²"
    accuracy_decimals: 1
    lambda: |-
      uint8_t raw[2];
      uint8_t reg = 0x28 | 0x80;
      id(i2c_bus).write(0x19, &reg, 1);
      id(i2c_bus).read(0x19, raw, 2);
      int16_t val = (raw[1] << 8) | raw[0];
      return val / 16384.0 * 9.81;

  - platform: template
    name: "Dice Accel Y"
    id: accel_y
    update_interval: 2s
    unit_of_measurement: "m/s²"
    accuracy_decimals: 1
    lambda: |-
      uint8_t raw[2];
      uint8_t reg = 0x2A | 0x80;
      id(i2c_bus).write(0x19, &reg, 1);
      id(i2c_bus).read(0x19, raw, 2);
      int16_t val = (raw[1] << 8) | raw[0];
      return val / 16384.0 * 9.81;

  - platform: template
    name: "Dice Accel Z"
    id: accel_z
    update_interval: 2s
    unit_of_measurement: "m/s²"
    accuracy_decimals: 1
    lambda: |-
      uint8_t raw[2];
      uint8_t reg = 0x2C | 0x80;
      id(i2c_bus).write(0x19, &reg, 1);
      id(i2c_bus).read(0x19, raw, 2);
      int16_t val = (raw[1] << 8) | raw[0];
      return val / 16384.0 * 9.81;

# Orientation detection
text_sensor:
  - platform: template
    name: "Office Status"
    id: office_status
    icon: "mdi:dice-multiple"
    update_interval: 2s
    lambda: |-
      float x = id(accel_x).state;
      float y = id(accel_y).state;
      float z = id(accel_z).state;

      if (isnan(x) || isnan(y) || isnan(z)) return {"unknown"};

      float threshold = 7.0;

      if (z > threshold)  return {"available"};
      if (z < -threshold) return {"not_working"};
      if (y > threshold)  return {"meeting"};
      if (y < -threshold) return {"afk"};
      if (x > threshold)  return {"focusing"};
      if (x < -threshold) return {"on_break"};

      return {"unknown"};

# USB power detection — GPIO1 via pwr_sens_e1 solder bridge (Rev C)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO1
      mode: INPUT
    name: "Dice USB Powered"
    id: usb_powered
    device_class: plug
    icon: "mdi:usb"

  - platform: template
    name: "Dice Charging"
    id: dice_charging
    device_class: battery_charging
    lambda: |-
      return id(usb_powered).state && id(battery_voltage).state < 4.18;

  - platform: template
    name: "Dice Working"
    id: dice_working
    icon: "mdi:briefcase"
    lambda: |-
      auto status = id(office_status).state;
      if (status == "unknown") return id(dice_working).state;
      return status == "available" || status == "focusing" || status == "meeting";


